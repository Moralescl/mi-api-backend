name: Despliegue Automático a Firebase

on:
  push:
    branches:
      - main  # Se ejecuta solo cuando subes cambios a la rama main

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub enciende una compu con Linux para esto
    steps:
      - name: Descargando código
        uses: actions/checkout@v3

      - name: Instalando Firebase Tools
        run: npm install -g firebase-tools

      - name: Subiendo a Firebase
        run: firebase deploy --token ${{ secrets.FIREBASE_TOKEN }}